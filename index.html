<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpriză pentru Andrei!</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: #d4af37;
            text-align: center;
        }

        
        #giftButton {
            padding: 20px 40px;
            font-size: 1.5rem;
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transition: transform 0.3s;
        }

            #giftButton:hover {
                transform: scale(1.1);
            }

        
        #mainContent {
            display: none;
        }

        img {
            max-width: 90vw;
            max-height: 70vh;
            border: 8px solid #d4af37;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
            margin-top: 20px;
        }

        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: explode 2s infinite;
        }

        @keyframes explode {
            0% {
                box-shadow: 0 0 #fff;
                opacity: 1;
            }

            100% {
                box-shadow: -100px -100px 0 #ff0, 100px -100px 0 #f0f, -100px 100px 0 #0ff, 100px 100px 0 #0f0, 0 -150px 0 #f00;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <button id="giftButton" onclick="showGift()">🎁 Deschide cadoul, Andrei!</button>

    <div id="mainContent">
        <div class="firework" style="top: 20%; left: 20%;"></div>
        <div class="firework" style="top: 15%; left: 80%; animation-delay: 0.5s;"></div>

        <h1>🤴 La mulți ani, Andrei! 🤴</h1>
        <img src="https://i.postimg.cc/s2zJ9T57/Whats-App-Image-2026-03-02-at-17-36-48.jpg" alt="Andrei Bonaparte">
        <h2>33 de ani de glorie!</h2>
    </div>

    <script>
        function showGift() {
            document.getElementById('giftButton').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }
    </script>

</body>
</html>
